training:
    noise: 3.0e-4
    batch_size: 16      # drastically lower for CPU
    gpu: 0           # forces CPU usage
    smooth: 0.05
    n_epochs: 2        # short test run
    lr: 3.0e-4
    warmup: 2           # proportionally reduced
    weight_decay: 0.0
    use_decoders: True

mlp:
    n_hidden_mlp: 64    # smaller model
    num_layers_mlp: 3   # fewer layers
    decoders: True
    latent_dim: 32      # smaller latent space
    dropout_probability: 0.1 